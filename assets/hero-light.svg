<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Ludovic Perrin — AI Engineer — Switzerland">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="33%" stop-color="#4f46e5"/>
      <stop offset="66%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <style>
      .name  { font: 700 56px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; fill: #1e1b4b; }
      .role  { font: 500 22px ui-sans-serif, system-ui, sans-serif; fill: #4338ca; letter-spacing: 0.04em; }
      .meta  { font: 400 14px ui-monospace, "JetBrains Mono", "SF Mono", monospace; fill: #4f46e5; letter-spacing: 0.06em; }
      .node  { font: 600 14px ui-monospace, "JetBrains Mono", monospace; fill: #1e1b4b; }
      .edge  { font: 400 10px ui-monospace, monospace; fill: #4f46e5; }
    </style>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>
  <rect x="0" y="337" width="1200" height="3" fill="url(#accent)"/>

  <!-- left side: identity -->
  <g transform="translate(60, 80)">
    <text class="meta" y="0">SELF-TAUGHT · SHIPPING SINCE 2026-01-01</text>
    <text class="name" y="60">Ludovic Perrin</text>
    <text class="role" y="100">AI Engineer · Indie product builder · Switzerland · remote</text>
    <g transform="translate(0, 140)">
      <rect width="170" height="32" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
      <text x="14" y="21" font="600 13px ui-sans-serif,system-ui,sans-serif" fill="#14532d">● Available — remote</text>
      <rect x="184" width="116" height="32" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
      <text x="198" y="21" font="600 13px ui-sans-serif,system-ui,sans-serif" fill="#312e81">forge-shield · PyPI</text>
      <rect x="316" width="184" height="32" rx="6" fill="#eef2ff" stroke="#818cf8" stroke-width="1"/>
      <text x="330" y="21" font="600 13px ui-sans-serif,system-ui,sans-serif" fill="#312e81">haoyanwuying.com · live</text>
    </g>
  </g>

  <!-- right side: dogfooded toolchain graph -->
  <g transform="translate(720, 50)">
    <g stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.55">
      <path d="M 80,60 C 130,60 130,30 180,30"/>
      <path d="M 80,60 C 130,60 130,90 180,90"/>
      <path d="M 80,60 C 130,60 130,150 180,150"/>
      <path d="M 80,60 C 130,60 130,210 180,210"/>
      <path d="M 80,180 C 130,180 130,120 180,120"/>
      <path d="M 80,180 C 130,180 130,240 180,240"/>
    </g>

    <g>
      <rect x="0" y="40" width="80" height="42" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
      <text class="node" x="40" y="65" text-anchor="middle">bible-ux</text>

      <rect x="0" y="160" width="80" height="42" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
      <text class="node" x="40" y="185" text-anchor="middle" fill="#14532d">forge</text>
    </g>

    <g>
      <rect x="180" y="10"  width="200" height="38" rx="6" fill="#ffffff" stroke="#818cf8" stroke-width="1"/>
      <text class="node" x="190" y="33">→ where-is-typewise</text>

      <rect x="180" y="70"  width="200" height="38" rx="6" fill="#ffffff" stroke="#818cf8" stroke-width="1"/>
      <text class="node" x="190" y="93">→ infernal-wheel</text>

      <rect x="180" y="130" width="200" height="38" rx="6" fill="#ffffff" stroke="#818cf8" stroke-width="1"/>
      <text class="node" x="190" y="153">→ MUNINN (memory)</text>

      <rect x="180" y="190" width="200" height="38" rx="6" fill="#ffffff" stroke="#818cf8" stroke-width="1"/>
      <text class="node" x="190" y="213">→ HSBC-algo-genetic</text>

      <rect x="180" y="250" width="200" height="38" rx="6" fill="#ffffff" stroke="#818cf8" stroke-width="1"/>
      <text class="node" x="190" y="273">→ -cole-de-danse</text>
    </g>

    <text class="edge" x="0" y="20">design system</text>
    <text class="edge" x="0" y="225">regression CI</text>
  </g>

  <text class="meta" x="60" y="295">1 PyPI · 2 MCP servers · 2 live sites · 10+ public repos · 2,689 commits last year</text>
  <text class="meta" x="60" y="316" fill="#6366f1">github.com/sky1241 · ludovik1241@gmail.com</text>
</svg>
