<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Ludovic Perrin — AI Engineer · Switzerland">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b14"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0b0b14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#312e81" stop-opacity="0"/>
      <stop offset="20%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="80%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <style>
      .meta-top { font: 500 14px ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace; fill: #a5b4fc; letter-spacing: 0.18em; }
      .name     { font: 700 72px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; fill: #ffffff; letter-spacing: -0.02em; }
      .role     { font: 500 22px ui-sans-serif, system-ui, sans-serif; fill: #c7d2fe; letter-spacing: 0.02em; }
      .meta-bot { font: 400 14px ui-monospace, "JetBrains Mono", monospace; fill: #818cf8; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#halo)"/>

  <!-- accent rails -->
  <rect x="0" y="0"   width="1200" height="2" fill="url(#accent)"/>
  <rect x="0" y="278" width="1200" height="2" fill="url(#accent)"/>

  <!-- centered identity -->
  <g text-anchor="middle">
    <text class="meta-top" x="600" y="60">SELF-TAUGHT  ·  SHIPPING SINCE 2026-01-01</text>
    <text class="name"     x="600" y="138">Ludovic Perrin</text>
    <text class="role"     x="600" y="178">AI Engineer  ·  Indie product builder  ·  Switzerland  ·  remote</text>
    <text class="meta-bot" x="600" y="222">1 PyPI  ·  2 MCP servers  ·  2 live sites  ·  10+ public repos  ·  2,689 commits last year</text>
    <text class="meta-bot" x="600" y="248" fill="#6366f1">github.com/sky1241   ·   ludovik1241@gmail.com</text>
  </g>
</svg>
